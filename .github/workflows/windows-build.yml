name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and test on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore LocalNetViewer.slnx

      - name: Build
        run: dotnet build LocalNetViewer.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test LocalNetViewer.slnx --configuration Release --no-build --verbosity normal
